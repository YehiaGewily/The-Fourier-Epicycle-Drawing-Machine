<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier Epicycle Drawing Machine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="sketch.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 100%);
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            cursor: crosshair;
        }

        /* Animated background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* Fade-in animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 255, 0.1);
            }

            50% {
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 255, 0.2);
            }
        }

        #controls {
            position: fixed;
            top: 24px;
            right: 24px;
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 24px 28px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
            z-index: 1000;
            min-width: 300px;
            animation: fadeInUp 0.6s ease-out;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #controls:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.15),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.08);
        }

        #controls h3 {
            color: #00ffff;
            margin: 0 0 20px 0;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5),
                0 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group {
            margin-bottom: 24px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #b0b0b0;
            font-size: 13px;
            margin-bottom: 12px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        #waveSlider {
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg,
                    rgba(0, 255, 255, 0.1) 0%,
                    rgba(0, 255, 255, 0.2) 100%);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        #waveSlider:hover {
            background: linear-gradient(90deg,
                    rgba(0, 255, 255, 0.15) 0%,
                    rgba(0, 255, 255, 0.25) 100%);
        }

        #waveSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #00ffff 0%, #00ccff 100%);
            border-radius: 50%;
            cursor: grab;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.7),
                0 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        #waveSlider::-webkit-slider-thumb:hover {
            transform: scale(1.25);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.9),
                0 4px 12px rgba(0, 0, 0, 0.4);
        }

        #waveSlider::-webkit-slider-thumb:active {
            cursor: grabbing;
            transform: scale(1.15);
        }

        #waveSlider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #00ffff 0%, #00ccff 100%);
            border-radius: 50%;
            cursor: grab;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.7),
                0 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #waveSlider::-moz-range-thumb:hover {
            transform: scale(1.25);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.9),
                0 4px 12px rgba(0, 0, 0, 0.4);
        }

        #waveSlider::-moz-range-thumb:active {
            cursor: grabbing;
            transform: scale(1.15);
        }

        #sliderValue {
            color: #00ffff;
            font-size: 16px;
            font-weight: 700;
            text-shadow: 0 0 12px rgba(0, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }

        button {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #ff006e 0%, #ff1485 50%, #ff006e 100%);
            background-size: 200% 100%;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(255, 0, 110, 0.4),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.2),
                    transparent);
            transition: left 0.5s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 0, 110, 0.6),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.3);
            background-position: 100% 0;
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.5);
        }

        #instructions {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 20px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
            color: #b0b0b0;
            font-size: 13px;
            max-width: 320px;
            z-index: 1000;
            animation: fadeInUp 0.6s ease-out 0.2s both;
            line-height: 1.6;
        }

        #instructions strong {
            color: #00ffff;
            display: block;
            margin-bottom: 12px;
            font-size: 15px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }

        #instructions p {
            margin: 8px 0;
            line-height: 1.8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #instructions b {
            color: #fff;
            font-weight: 600;
            min-width: 80px;
        }

        /* State indicator */
        #stateIndicator {
            position: fixed;
            top: 24px;
            left: 24px;
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 12px 20px;
            border-radius: 30px;
            color: #00ffff;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #stateIndicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            #controls {
                top: 16px;
                right: 16px;
                left: 16px;
                min-width: auto;
                padding: 20px;
            }

            #controls h3 {
                font-size: 18px;
            }

            #instructions {
                bottom: 16px;
                left: 16px;
                right: 16px;
                max-width: none;
                font-size: 12px;
            }

            #stateIndicator {
                top: auto;
                bottom: 16px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 11px;
                padding: 10px 16px;
            }
        }

        @media (max-width: 480px) {
            body {
                cursor: default;
            }

            #controls {
                padding: 16px;
            }

            #controls h3 {
                font-size: 16px;
                margin-bottom: 16px;
            }

            .control-group {
                margin-bottom: 16px;
            }

            label {
                font-size: 12px;
            }

            button {
                padding: 12px 16px;
                font-size: 13px;
            }

            #instructions {
                position: relative;
                bottom: auto;
                left: auto;
                margin: 16px;
            }

            #instructions strong {
                font-size: 14px;
            }

            #instructions p {
                font-size: 12px;
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            #instructions b {
                min-width: auto;
            }
        }

        /* Canvas wrapper */
        canvas {
            display: block;
            border-radius: 0;
            box-shadow: 0 0 100px rgba(0, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div id="stateIndicator">Drawing Mode</div>

    <div id="controls">
        <h3>⚙️ Controls</h3>

        <div class="control-group">
            <label for="waveSlider">Epicycles: <span id="sliderValue">1</span></label>
            <input type="range" id="waveSlider" min="1" max="1" value="1">
        </div>

        <div class="control-group">
            <button id="resetBtn">🔄 New Drawing</button>
        </div>
    </div>

    <div id="instructions">
        <strong>How to Use:</strong>
        <p><b>Draw:</b> Click and drag to sketch</p>
        <p><b>Animate:</b> Release to see epicycles</p>
        <p><b>Experiment:</b> Adjust slider to see approximations</p>
    </div>
</body>

</html>
