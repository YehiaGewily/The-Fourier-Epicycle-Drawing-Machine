<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier Epicycle Drawing Machine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
</head>

<body>
    <div id="stateIndicator" class="panel">Drawing Mode</div>

    <div id="controls" class="panel">
        <h3>⚙️ Controls</h3>

        <div class="control-group">
            <label for="epicycleSlider">
                Epicycles
                <span class="value"><span id="epicycleValue">1</span><span class="dim"> / <span id="epicycleMax">1</span></span></span>
            </label>
            <input type="range" id="epicycleSlider" class="slider" min="1" max="1" value="1">
        </div>

        <div class="control-group">
            <label for="speedSlider">
                Speed <span class="value" id="speedValue">1.0×</span>
            </label>
            <input type="range" id="speedSlider" class="slider" min="0.1" max="4" step="0.1" value="1">
        </div>

        <div class="control-group">
            <button id="uploadBtn" class="btn-secondary" style="width:100%">🖼️ Trace an Image</button>
            <input type="file" id="imageInput" accept="image/*" hidden>
        </div>

        <div class="control-group" id="imageOptions" hidden>
            <label for="thresholdSlider">
                Threshold <span class="value" id="thresholdValue">128</span>
            </label>
            <input type="range" id="thresholdSlider" class="slider" min="1" max="254" value="128">
            <div class="toggle-row" style="margin-top:14px">
                <span>Invert</span>
                <label class="switch">
                    <input type="checkbox" id="toggleInvert">
                    <span class="track"></span>
                </label>
            </div>
        </div>

        <div class="control-group">
            <div class="toggle-row">
                <span>Show Circles</span>
                <label class="switch">
                    <input type="checkbox" id="toggleCircles" checked>
                    <span class="track"></span>
                </label>
            </div>
            <div class="toggle-row">
                <span>Show Reference</span>
                <label class="switch">
                    <input type="checkbox" id="toggleReference" checked>
                    <span class="track"></span>
                </label>
            </div>
        </div>

        <div class="control-group">
            <div class="btn-row">
                <button id="playPauseBtn" class="btn-secondary">⏸ Pause</button>
                <button id="saveBtn" class="btn-secondary">💾 Save</button>
            </div>
        </div>

        <div class="control-group">
            <button id="resetBtn" class="btn-primary">🔄 New Drawing</button>
        </div>
    </div>

    <div id="instructions" class="panel">
        <strong>How to Use</strong>
        <p><b>Draw:</b> Click &amp; drag to sketch (<span id="pointCount">0</span> pts)</p>
        <p><b>Or trace:</b> Upload / drop an image</p>
        <p><b>Animate:</b> Release to see epicycles</p>
        <p><b>Tune:</b> Slider sets approximation detail</p>
        <p><b>Keys:</b> <kbd>Space</kbd> play · <kbd>R</kbd> reset · <kbd>S</kbd> save</p>
    </div>

    <script src="js/fourier.js"></script>
    <script src="js/epicycles.js"></script>
    <script src="js/imagetrace.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/sketch.js"></script>
</body>

</html>
